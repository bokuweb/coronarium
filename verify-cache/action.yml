name: "sakimori-verify-cache"
description: |
  Re-hash the package manager's local cache against the lockfile's
  `integrity:` fields and fail the job if any byte doesn't match what
  the lockfile pinned. Catches the *content* half of TanStack-style
  GitHub Actions cache poisoning: a tarball restored from cache that
  no longer hashes to its claimed integrity.

  Run this immediately after the install step (`npm ci`, `pnpm
  install`) — that's the moment when the cache is fully populated
  but the build hasn't yet consumed it.

  Supports `package-lock.json` (npm cacache) and `pnpm-lock.yaml`
  (pnpm store v3). Auto-detects ecosystem from the lockfile name and
  picks the default cache root for the runner OS.
author: "bokuweb"
branding:
  icon: "check-circle"
  color: "red"

inputs:
  lockfile:
    description: |
      Path to the lockfile to verify. Either `package-lock.json` or
      `pnpm-lock.yaml`.
    required: true
  cache:
    description: |
      Optional override for the package manager's cache root.
      Auto-detected from the runner OS:
        npm   — `~/.npm/_cacache` (Linux/macOS) /
                `%LOCALAPPDATA%\npm-cache\_cacache` (Windows)
        pnpm  — `~/.local/share/pnpm/store/v3` (Linux) /
                `~/Library/pnpm/store/v3` (macOS) /
                `%LOCALAPPDATA%\pnpm\store\v3` (Windows)
        cargo — `$CARGO_HOME` if set, else `~/.cargo` /
                `%USERPROFILE%\.cargo`
      Pass explicitly only when the runner uses a non-default layout
      (corporate runners, monorepos with isolated stores, etc.).
    required: false
    default: ""
  format:
    description: |
      Output format. `text` (default) prints a one-line summary plus
      mismatched / missing entries; `json` prints the full report.
    required: false
    default: "text"
  version:
    description: |
      sakimori release tag to download. Defaults to the floating
      `v0` tag.
    required: false
    default: "v0"
  token:
    description: "GitHub token for `gh release download`."
    required: false
    default: ${{ github.token }}
  strict:
    description: |
      When `true`, also fail the run if any blob is *missing* from
      the cache (default: only mismatches — the actual tampering
      signal — fail). Leave at the default for cargo (`Cargo.lock`
      legitimately lists platform-conditional crates that never
      land in a single-OS runner's cache). Set to `true` for npm /
      pnpm right after install if you want post-install
      completeness checking too.
    required: false
    default: "false"

runs:
  using: node20
  main: "main.js"
