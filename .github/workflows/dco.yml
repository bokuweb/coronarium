name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check that every commit is signed off
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer."
              echo "  Author: $(git log -1 --format='%an <%ae>' "$sha")"
              echo "  Subject: $(git log -1 --format=%s "$sha")"
              missing=$((missing + 1))
            fi
          done < <(git rev-list "$base..$head")
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Please sign off your commits. See CONTRIBUTING.md for details:"
            echo "  git rebase --signoff $base && git push --force-with-lease"
            exit 1
          fi
          echo "All commits signed off."
