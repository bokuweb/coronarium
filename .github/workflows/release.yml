name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release + upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # --- userspace (static musl) ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build userspace binary
        run: cargo build --release -p coronarium --target ${{ matrix.target }}

      # --- eBPF object (arch-independent ELF, but rebuild per runner for determinism) ---
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install bpf-linker
        run: |
          sudo apt-get install -y llvm-19-dev libclang-19-dev
          cargo install bpf-linker --locked
      - name: Build eBPF object
        working-directory: crates/coronarium-ebpf
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: cargo build --release --target bpfel-unknown-none -Z build-std=core

      # --- package ---
      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          name="coronarium-${{ matrix.target }}"
          staging="staging/${name}"
          mkdir -p "${staging}"
          cp target/${{ matrix.target }}/release/coronarium "${staging}/coronarium"
          cp crates/coronarium-ebpf/target/bpfel-unknown-none/release/coronarium "${staging}/coronarium.bpf.o"
          cp README.md LICENSE-MIT LICENSE-APACHE "${staging}/" 2>/dev/null || true
          tar -czf "${name}.tar.gz" -C staging "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "tarball=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            coronarium-${{ matrix.target }}.tar.gz
            coronarium-${{ matrix.target }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="Release ${TAG}. Assets: userspace binary + coronarium.bpf.o per target."
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${notes}" \
            dist/*.tar.gz dist/*.sha256

  moving-tag:
    # Update the floating `v<MAJOR>` tag so consumers can pin `@v0` and get
    # the newest v0.x.y automatically. Skipped for pre-release tags.
    needs: publish
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update v<MAJOR> tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          major=$(echo "${TAG}" | sed -E 's/^v([0-9]+).*/v\1/')
          echo "Updating moving tag ${major} -> ${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${major}"
          git push origin "${major}" --force
