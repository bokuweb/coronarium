name: consumer-smoke

# Proves the published release is consumable as `bokuweb/coronarium@v0`.
# Runs after a release is published, on manual dispatch, and on PRs
# (so we exercise the PR-comment sub-action end-to-end).

on:
  workflow_dispatch:
  pull_request:
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: write

jobs:
  use-as-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The exact pattern third-party consumers will write.
      - uses: bokuweb/coronarium@v0
        with:
          mode: audit

      - name: Run supervised command
        run: |
          cat > /tmp/policy.yml <<'EOF'
          mode: audit
          network:
            default: allow
          file:
            default: allow
            deny:
              - /etc/shadow
          EOF
          sudo -E "$CORONARIUM_BIN" run \
            --policy /tmp/policy.yml \
            --log coronarium.log.json \
            --html coronarium-report.html \
            --summary "$GITHUB_STEP_SUMMARY" \
            -- /bin/sh -c 'cat /etc/shadow >/dev/null 2>&1 || true; cat /etc/hostname >/dev/null; curl -s -o /dev/null https://example.com || true'
          cat coronarium.log.json | head -60
          observed=$(python3 -c 'import json;print(json.load(open("coronarium.log.json"))["observed"])')
          test "$observed" -gt 0
          test -f coronarium-report.html

      # Upload both so the comment's one-liner can pull the HTML.
      - uses: actions/upload-artifact@v4
        with:
          name: coronarium-report
          path: |
            coronarium-report.html
            coronarium.log.json

      # Only meaningful on pull_request events — on release/dispatch this
      # step no-ops (the sub-action bails early).
      - uses: bokuweb/coronarium/comment@v0
        if: github.event_name == 'pull_request'
        with:
          log: coronarium.log.json
          artifact-name: coronarium-report
          html-filename: coronarium-report.html

      - name: Verify PR comment was posted
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" --paginate \
            --jq '.[] | .body' | grep -q "coronarium-report" \
            || { echo "::error::comment not found on PR"; exit 1; }
          echo "✓ coronarium-report comment is on PR #${pr}"

  block-as-action:
    # Complement the audit-mode happy path with a block-mode run that
    # asserts the published action actually makes CI fail when a deny
    # happens. Runs alongside use-as-action (doesn't need its results).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bokuweb/coronarium@v0
        with:
          mode: block
      - name: Block-mode run should fail with a denied connect
        run: |
          cat > /tmp/block.yml <<'EOF'
          mode: block
          network: {}
          EOF
          set +e
          sudo -E "$CORONARIUM_BIN" run \
            --policy /tmp/block.yml \
            --log /tmp/block.log.json \
            -- /bin/sh -c 'curl -sS -o /dev/null -m 5 http://93.184.216.34 2> /tmp/curl.stderr; echo curl_rc=$? > /tmp/child'
          rc=$?
          set -e
          echo "coronarium rc=${rc}"
          cat /tmp/child
          cat /tmp/curl.stderr
          cat /tmp/block.log.json | head -40
          if [ "$rc" = "0" ]; then
            echo "::error::released action did not fail in block mode"
            exit 1
          fi
          grep -q "curl_rc=0" /tmp/child && {
            echo "::error::kernel did not actually deny the connect"
            exit 1
          } || true
          echo "✓ released action fails CI on block + deny, and curl itself was blocked"
