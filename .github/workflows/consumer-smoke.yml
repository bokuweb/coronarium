name: consumer-smoke

# Proves the published release is consumable as `bokuweb/coronarium@v0`.
# Runs after a release is published, on manual dispatch, and on PRs
# (so we exercise the PR-comment sub-action end-to-end).

on:
  workflow_dispatch:
  pull_request:
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: write

jobs:
  use-as-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The exact pattern third-party consumers will write.
      - uses: bokuweb/coronarium@v0
        with:
          mode: audit

      - name: Run supervised command
        run: |
          cat > /tmp/policy.yml <<'EOF'
          mode: audit
          network:
            default: allow
          file:
            default: allow
            deny:
              - /etc/shadow
          EOF
          sudo -E "$CORONARIUM_BIN" run \
            --policy /tmp/policy.yml \
            --log coronarium.log.json \
            --html coronarium-report.html \
            --summary "$GITHUB_STEP_SUMMARY" \
            -- /bin/sh -c 'cat /etc/shadow >/dev/null 2>&1 || true; cat /etc/hostname >/dev/null; curl -s -o /dev/null https://example.com || true'
          cat coronarium.log.json | head -60
          observed=$(python3 -c 'import json;print(json.load(open("coronarium.log.json"))["observed"])')
          test "$observed" -gt 0
          test -f coronarium-report.html

      # Upload both so the comment's one-liner can pull the HTML.
      - uses: actions/upload-artifact@v4
        with:
          name: coronarium-report
          path: |
            coronarium-report.html
            coronarium.log.json

      # Only meaningful on pull_request events — on release/dispatch this
      # step no-ops (the sub-action bails early).
      - uses: bokuweb/coronarium/comment@v0
        if: github.event_name == 'pull_request'
        with:
          log: coronarium.log.json
          artifact-name: coronarium-report
          html-filename: coronarium-report.html

      - name: Verify PR comment was posted
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" --paginate \
            --jq '.[] | .body' | grep -q "coronarium-report" \
            || { echo "::error::comment not found on PR"; exit 1; }
          echo "✓ coronarium-report comment is on PR #${pr}"
